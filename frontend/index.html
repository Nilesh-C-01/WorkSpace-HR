<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directory | Workspace HR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Custom Scrollbar for dark theme */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #121212; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
    </style>
</head>
<body class="bg-[#121212] text-gray-200 h-screen flex overflow-hidden font-sans">

    <aside class="w-64 bg-[#181818] border-r border-gray-800 flex flex-col hidden md:flex">
        <div class="p-6 flex items-center space-x-3">
            <div class="flex space-x-1">
                <div class="w-3 h-3 rounded-full bg-red-500"></div>
                <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
                <div class="w-3 h-3 rounded-full bg-green-500"></div>
                <div class="w-3 h-3 rounded-full bg-blue-500"></div>
            </div>
            <span class="text-xl font-semibold text-white">WorkspaceHR</span>
        </div>
        
        <nav class="flex-1 px-4 space-y-2 mt-4">
            <button class="w-full flex items-center space-x-3 bg-transparent text-gray-400 hover:text-white hover:bg-[#252525] px-4 py-3 rounded-xl transition">
                <i class="fas fa-user-plus w-5"></i>
                <span>New Hire</span>
            </button>
            <button class="w-full flex items-center space-x-3 bg-[#1e3a5f] text-blue-400 px-4 py-3 rounded-xl border border-[#2a4b7c]">
                <i class="fas fa-users w-5"></i>
                <span class="font-medium">Directory</span>
            </button>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-y-auto">
        <header class="h-20 border-b border-gray-800 flex items-center justify-between px-6 lg:px-8 bg-[#121212] sticky top-0 z-10">
            <h1 class="text-2xl font-semibold text-white">Directory</h1>
            
            <div class="flex items-center space-x-6">
                <div class="relative hidden md:block">
                    <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-500"></i>
                    <input type="text" placeholder="Search directory..." class="bg-[#1e1e1e] border border-gray-700 text-sm rounded-full pl-10 pr-4 py-2 w-64 focus:outline-none focus:border-gray-500 text-white">
                </div>
                
                <div class="flex items-center space-x-3 border-l border-gray-800 pl-6">
                    <div class="text-right hidden md:block">
                        <p class="text-sm font-medium text-white" id="user-name">HR Admin</p>
                        <p class="text-xs text-gray-500">HR Admin</p>
                    </div>
                    <div class="w-10 h-10 rounded-full bg-[#8ab4f8] text-[#121212] flex items-center justify-center font-bold text-lg" id="user-initials">
                        HA
                    </div>
                    <button id="logout-btn" class="ml-2 text-gray-500 hover:text-white transition" title="Logout">
                        <i class="fas fa-sign-out-alt text-xl"></i>
                    </button>
                </div>
            </div>
        </header>

        <div class="p-6 lg:p-8 max-w-6xl mx-auto w-full space-y-8">
            
            <div class="bg-[#181818] rounded-2xl border border-gray-800 p-6 lg:p-8 shadow-lg relative">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                    <h2 class="text-xl font-semibold text-white flex items-center">
                        <i class="fas fa-user-plus mr-3 text-blue-400"></i> Onboard Employee
                    </h2>
                    <button id="toggle-ai-btn" class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-full text-sm font-medium transition flex items-center shadow-lg shadow-purple-900/20 w-full md:w-auto justify-center">
                        <i class="fas fa-sparkles mr-2"></i> Auto-Fill with AI
                    </button>
                </div>

                <div id="ai-section" class="mb-8 p-1 rounded-xl bg-gradient-to-r from-purple-900/40 to-indigo-900/40 border border-purple-800/50">
                    <div class="bg-[#121212] p-4 rounded-lg">
                        <label class="block text-xs font-semibold text-purple-400 uppercase tracking-wider mb-2">Paste Candidate's Resume or Bio here:</label>
                        <textarea id="ai-resume-text" rows="3" class="w-full bg-transparent text-gray-300 placeholder-gray-600 resize-none focus:outline-none text-sm" placeholder="e.g. Rahul Sharma is an experienced Software Engineer. You can reach him at rahul@email.com..."></textarea>
                        <button id="extract-ai-btn" class="w-full mt-3 bg-purple-600 hover:bg-purple-700 text-white py-2.5 rounded-lg text-sm font-semibold transition flex items-center justify-center">
                            Extract & Fill Form
                        </button>
                    </div>
                </div>

                <form id="employee-form" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-xs font-medium text-gray-400 mb-1">Full Name</label>
                            <input type="text" id="name" class="w-full bg-[#1e1e1e] border border-gray-700 text-white rounded-lg px-4 py-2.5 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition" required>
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-400 mb-1">Company Email</label>
                            <input type="email" id="email" class="w-full bg-[#1e1e1e] border border-gray-700 text-white rounded-lg px-4 py-2.5 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition" required>
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-400 mb-1">Job Role</label>
                            <select id="role" class="w-full bg-[#1e1e1e] border border-gray-700 text-white rounded-lg px-4 py-2.5 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition appearance-none" required>
                                <option value="" disabled selected>Select a role...</option>
                                <option value="Software Engineer">Software Engineer</option>
                                <option value="Data Scientist">Data Scientist</option>
                                <option value="Product Manager">Product Manager</option>
                                <option value="HR Executive">HR Executive</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-400 mb-1">Start Date</label>
                            <input type="date" id="joining_date" class="w-full bg-[#1e1e1e] border border-gray-700 text-white rounded-lg px-4 py-2.5 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition" style="color-scheme: dark;" required>
                        </div>
                    </div>
                    <div class="flex justify-end pt-2">
                        <button type="submit" class="bg-[#8ab4f8] hover:bg-blue-400 text-[#121212] font-semibold px-6 py-2.5 rounded-full transition shadow-lg w-full md:w-auto">
                            Save Employee
                        </button>
                    </div>
                </form>
            </div>

            <div class="bg-[#181818] rounded-2xl border border-gray-800 overflow-hidden shadow-lg">
                <div class="px-6 py-5 border-b border-gray-800">
                    <h2 class="text-lg font-semibold text-white">All Employees</h2>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm text-gray-400 min-w-[600px]">
                        <thead class="text-xs uppercase bg-[#121212] text-gray-500 border-b border-gray-800">
                            <tr>
                                <th scope="col" class="px-6 py-4 font-medium">Name</th>
                                <th scope="col" class="px-6 py-4 font-medium">Role</th>
                                <th scope="col" class="px-6 py-4 font-medium">Start Date</th>
                                <th scope="col" class="px-6 py-4 font-medium">Status</th>
                                <th scope="col" class="px-6 py-4 font-medium text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="employee-table-body" class="divide-y divide-gray-800">
                            </tbody>
                    </table>
                    
                    <div id="empty-state" class="hidden flex flex-col items-center justify-center py-12 text-gray-500">
                        <i class="fas fa-id-badge text-4xl mb-3 text-gray-700"></i>
                        <p class="text-base font-medium text-gray-400">No employees found.</p>
                        <p class="text-sm">Add a new employee using the form above.</p>
                    </div>
                </div>
            </div>

        </div>
    </main>
    <script src="js/app.js"></script>
</body>
</html>
