<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directory | Workspace HR</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css">
    
    <script>
        function updateTheme() {
            if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.documentElement.classList.add('dark');
            } else { document.documentElement.classList.remove('dark'); }
        }
        updateTheme();
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', updateTheme);
    </script>
</head>
<body class="bg-[#f3f6fc] dark:bg-[#131314] text-[#1f1f1f] dark:text-[#e3e3e3] h-screen flex overflow-hidden">

    <aside class="w-64 flex flex-col h-full py-4 px-3 border-r border-[#e1e3e1] dark:border-[#444746] bg-[#f3f6fc] dark:bg-[#131314]">
        <div class="flex items-center gap-2 px-3 mb-8">
            <div class="flex gap-0.5">
                <div class="w-2.5 h-2.5 rounded-full bg-[#ea4335]"></div>
                <div class="w-2.5 h-2.5 rounded-full bg-[#fbbc04]"></div>
                <div class="w-2.5 h-2.5 rounded-full bg-[#34a853]"></div>
                <div class="w-2.5 h-2.5 rounded-full bg-[#4285f4]"></div>
            </div>
            <span class="text-xl font-normal text-[#444746] dark:text-[#c4c7c5]">Workspace<span class="font-medium text-[#1f1f1f] dark:text-[#e3e3e3]">HR</span></span>
        </div>
        
        <button class="mb-6 flex items-center gap-3 bg-[#c2e7ff] dark:bg-[#004a77] text-[#001d35] dark:text-[#c2e7ff] px-4 py-4 rounded-[16px] hover:bg-[#b5e0ff] transition-colors shadow-sm w-[140px] font-medium ml-1">
            <span class="material-symbols-outlined">person_add</span> New Hire
        </button>
        
        <nav class="flex-1 space-y-1">
            <a href="#" class="flex items-center gap-4 px-4 py-2.5 bg-[#d3e3fd] dark:bg-[#004a77] text-[#0b57d0] dark:text-[#a8c7fa] rounded-full font-medium">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">groups</span> Directory
            </a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-full relative">
        <header class="h-16 flex items-center justify-between px-6">
            <div class="text-xl font-normal hidden md:block">Directory</div>
            
            <div class="flex-1 max-w-2xl mx-4 md:mx-8">
                <div class="relative flex items-center bg-[#e9eef6] dark:bg-[#1e1f22] rounded-full px-4 py-2.5 focus-within:bg-white dark:focus-within:bg-[#282a2d] focus-within:shadow-md transition-all">
                    <span class="material-symbols-outlined text-[#444746] dark:text-[#c4c7c5]">search</span>
                    <input type="text" id="searchInput" placeholder="Search directory..." class="w-full bg-transparent border-none outline-none ml-3 text-[#1f1f1f] dark:text-[#e3e3e3] placeholder-[#444746] dark:placeholder-[#c4c7c5]">
                </div>
            </div>

            <div class="flex items-center gap-4 text-[#444746] dark:text-[#c4c7c5]">
                <div class="flex items-center gap-3">
                    <div class="text-right hidden sm:block">
                        <div id="displayUserName" class="text-sm font-medium text-[#1f1f1f] dark:text-[#e3e3e3]">Loading...</div>
                        <div class="text-xs">HR Admin</div>
                    </div>
                    <div id="userAvatar" class="w-8 h-8 rounded-full bg-[#0b57d0] dark:bg-[#a8c7fa] text-white dark:text-[#051e49] flex items-center justify-center font-medium">?</div>
                </div>
                <button onclick="handleLogout()" class="ml-2 p-2 hover:bg-[#e9eef6] dark:hover:bg-[#282a2d] rounded-full transition-colors" title="Logout">
                    <span class="material-symbols-outlined text-[20px]">logout</span>
                </button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-6">
            <div class="max-w-6xl mx-auto space-y-6">
                
                <div class="bg-white dark:bg-[#1e1e1e] rounded-[24px] p-8 shadow-sm border border-[#e1e3e1] dark:border-[#444746]">
                    
                    <div class="flex items-center justify-between mb-6">
                        <div class="flex items-center gap-3">
                            <span class="material-symbols-outlined text-[#0b57d0] dark:text-[#a8c7fa] text-3xl">person_add</span>
                            <h2 class="text-2xl font-normal">Onboard Employee</h2>
                        </div>
                        <button type="button" id="aiMagicBtn" onclick="toggleAIBox()" class="px-4 py-2 bg-gradient-to-r from-purple-500 to-indigo-500 text-white text-sm font-medium rounded-full shadow-sm hover:opacity-90 transition-opacity flex items-center gap-2">
                            <span class="material-symbols-outlined text-[18px]">auto_awesome</span> Auto-Fill with AI
                        </button>
                    </div>

                    <div id="aiBox" class="hidden mb-6 p-5 bg-purple-50 dark:bg-[#2a1b3d] rounded-xl border border-purple-100 dark:border-purple-900 transition-all">
                        <label class="text-xs font-medium text-purple-700 dark:text-purple-300 mb-2 block">Paste Candidate's Resume or Bio here:</label>
                        <textarea id="resumeText" rows="3" class="w-full p-3 rounded-lg border border-purple-200 dark:border-purple-800 bg-white dark:bg-[#1e1e1e] text-sm focus:outline-none focus:border-purple-500 mb-3" placeholder="e.g. Rahul Sharma is an experienced Software Engineer. You can reach him at rahul@email.com..."></textarea>
                        <button type="button" id="parseBtn" onclick="parseResume()" class="px-5 py-2.5 bg-purple-600 text-white text-sm font-medium rounded-lg hover:bg-purple-700 transition-colors w-full shadow-sm">
                            Extract & Fill Form
                        </button>
                    </div>

                    <form id="onboardingForm" class="space-y-6 max-w-3xl">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="flex flex-col">
                                <label class="text-xs font-medium text-[#444746] dark:text-[#c4c7c5] mb-1">Full Name</label>
                                <input type="text" id="empName" required class="google-input px-3 py-3">
                            </div>
                            <div class="flex flex-col">
                                <label class="text-xs font-medium text-[#444746] dark:text-[#c4c7c5] mb-1">Company Email</label>
                                <input type="email" id="empEmail" required class="google-input px-3 py-3">
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="flex flex-col">
                                <label class="text-xs font-medium text-[#444746] dark:text-[#c4c7c5] mb-1">Job Role</label>
                                <select id="empRole" class="google-input px-3 py-3 [&>option]:text-black">
                                    <option>Software Engineer</option>
                                    <option>Data Scientist</option>
                                    <option>Product Manager</option>
                                    <option>HR Executive</option>
                                </select>
                            </div>
                            <div class="flex flex-col">
                                <label class="text-xs font-medium text-[#444746] dark:text-[#c4c7c5] mb-1">Start Date</label>
                                <input type="date" id="empDate" required class="google-input px-3 py-3 [&::-webkit-calendar-picker-indicator]:dark:invert">
                            </div>
                        </div>
                        <div class="pt-4 flex justify-end gap-3">
                            <button type="submit" class="px-6 py-2.5 bg-[#0b57d0] dark:bg-[#a8c7fa] text-white dark:text-[#051e49] font-medium rounded-full hover:bg-[#0842a0] transition-colors shadow-sm">Save Employee</button>
                        </div>
                    </form>
                </div>

                <div class="bg-white dark:bg-[#1e1e1e] rounded-[24px] overflow-hidden shadow-sm border border-[#e1e3e1] dark:border-[#444746]">
                    <div class="px-6 py-5 border-b border-[#e1e3e1] dark:border-[#444746]">
                        <h2 class="text-xl font-normal">All Employees</h2>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="border-b border-[#e1e3e1] dark:border-[#444746]">
                                    <th class="px-6 py-3 text-sm font-medium text-[#444746] dark:text-[#c4c7c5]">Name</th>
                                    <th class="px-6 py-3 text-sm font-medium text-[#444746] dark:text-[#c4c7c5]">Role</th>
                                    <th class="px-6 py-3 text-sm font-medium text-[#444746] dark:text-[#c4c7c5]">Start Date</th>
                                    <th class="px-6 py-3 text-sm font-medium text-[#444746] dark:text-[#c4c7c5]">Status</th>
                                    <th class="px-6 py-3 text-sm font-medium text-[#444746] dark:text-[#c4c7c5] text-right">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="employeeTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="deleteModal" class="fixed inset-0 z-[100] hidden items-center justify-center opacity-0 transition-opacity duration-300">
        <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="closeDeleteModal()"></div>
        <div class="relative bg-white dark:bg-[#282a2d] rounded-[24px] shadow-2xl max-w-sm w-full p-6 border border-[#e1e3e1] dark:border-[#444746] transform scale-95 transition-transform duration-300 mx-4">
            <div class="flex flex-col items-center text-center">
                <div class="w-12 h-12 rounded-full bg-[#fce8e6] dark:bg-[#5c1e19] flex items-center justify-center mb-4">
                    <span class="material-symbols-outlined text-[#c5221f] dark:text-[#f28b82] text-2xl">delete_forever</span>
                </div>
                <h3 class="text-xl font-normal text-[#1f1f1f] dark:text-[#e3e3e3] mb-2" id="deleteModalTitle">Remove?</h3>
                <p class="text-sm text-[#444746] dark:text-[#c4c7c5] mb-6">Are you sure you want to remove this employee?</p>
                <div class="flex justify-end gap-3 w-full">
                    <button onclick="closeDeleteModal()" class="px-5 py-2.5 text-[#0b57d0] dark:text-[#a8c7fa] font-medium rounded-full hover:bg-[#f3f6fc] dark:hover:bg-[#1e1f22] transition-colors">Cancel</button>
                    <button id="confirmDeleteBtn" class="px-5 py-2.5 bg-[#b3261e] dark:bg-[#f2b8b5] text-white dark:text-[#601410] font-medium rounded-full hover:bg-[#8c1d18] transition-colors shadow-sm">Remove</button>
                </div>
            </div>
        </div>
    </div>

    <script src="JS/app.js"></script>
</body>
</html>
